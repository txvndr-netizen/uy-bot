<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mening Platformam</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --surface: rgba(20, 20, 20, 0.95);
            --bg-dark: #050505;
            --primary: #D4AF37; 
            --primary-dark: #B8860B;
            --secondary: #ffffff;
            --text-main: #f8f8f8;
            --text-muted: #a0a0a0;
            --danger: #ff4d4d;
            --border: rgba(212, 175, 55, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; padding-top: 60px;
        }

        .app-header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(5, 5, 5, 0.95); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 1000;
        }

        .header-btn { background: none; border: none; font-size: 24px; color: var(--secondary); cursor: pointer; }
        .header-title { font-size: 18px; font-weight: 700; color: var(--primary); text-transform: uppercase; }

        .sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100vh;
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); z-index: 2000;
            border-right: 1px solid var(--border); transition: left 0.3s; display: flex; flex-direction: column;
        }
        .sidebar.open { left: 0; }

        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7); z-index: 1500; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .sidebar-overlay.open { opacity: 1; pointer-events: all; }

        .sidebar-header { padding: 40px 20px 24px; border-bottom: 1px solid var(--border); }
        .profile-name { font-size: 16px; font-weight: 700; color: var(--primary); }

        .menu-item { padding: 16px 20px; font-size: 15px; font-weight: 500; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .menu-item:active { background: rgba(255,255,255,0.1); }

        .page-container { padding: 16px; display: none; }
        .page-container.active { display: block; }
        .back-nav { display: inline-flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; color: var(--primary); padding: 8px 0; margin-bottom: 16px; cursor: pointer; }

        .post-card { background: #111; border: 1px solid var(--border); border-radius: 16px; margin-bottom: 24px; overflow: hidden; }
        .post-media { width: 100%; max-height: 400px; background: #000; display: block; object-fit: contain; }
        .post-content { padding: 16px; }
        .post-date { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
        .post-text { font-size: 15px; line-height: 1.6; white-space: pre-wrap; }

        .btn-delete { width: 100%; padding: 12px; background: rgba(255,0,0,0.1); color: var(--danger); border: 1px solid var(--danger); border-radius: 8px; font-weight: bold; margin-top: 16px; cursor: pointer; }

        .form-panel { background: var(--surface); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); }
        .input-group textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #0a0a0a; color: #fff; font-size: 15px; outline: none; }
        
        .upload-box { width: 100%; padding:20px; border: 2px dashed var(--primary); background: rgba(212, 175, 55, 0.05); border-radius: 12px; text-align:center; cursor: pointer; position: relative; }
        .upload-box p { color:var(--primary); font-weight:600; }
        .upload-box audio, .upload-box video, .upload-box img { width: 100%; max-height: 200px; margin-top: 10px; display: none; object-fit:contain; border-radius:8px;}

        .btn-primary { width: 100%; padding: 16px; background: var(--primary); color: #000; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase; }
        .btn-primary:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="app-header">
        <button class="header-btn" onclick="toggleSidebar()">☰</button>
        <div class="header-title">Arxiv / Kundalik</div>
        <div style="width: 24px;"></div>
    </div>

    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div style="display: flex; justify-content: space-between;">
                <div class="profile-name" id="userNameTxt">Mehmon</div>
                <div onclick="toggleSidebar()" style="font-size: 24px; color: #fff; cursor: pointer;">✕</div>
            </div>
            <div style="color:var(--text-muted); font-size:12px; margin-top:4px;" id="userIdTxt"></div>
        </div>
        
        <div style="flex-grow: 1; overflow-y: auto;">
            <div class="menu-item" onclick="navigate('listView'); toggleSidebar();">📖 Barcha Postlar</div>
            
            <div id="adminMenuSection" style="display:none; border-top:1px solid #333; margin-top:10px;">
                <div style="padding: 16px 20px 8px; color:var(--primary); font-size:11px; font-weight:bold;">TIZIM BOSHQARUVI (ADMIN)</div>
                <div class="menu-item" onclick="navigate('addView'); toggleSidebar();" style="color:var(--primary);">➕ Yangi Post Qo'shish</div>
            </div>
        </div>
    </div>

    <!-- LIST VIEW -->
    <div id="listView" class="page-container active">
        <div id="posts-grid"><div style="text-align:center; margin-top:40px;">Yuklanmoqda...</div></div>
    </div>

    <!-- ADD VIEW -->
    <div id="addView" class="page-container">
        <div class="back-nav" onclick="navigate('listView')">← Orqaga</div>
        <div class="form-panel">
            <h2 style="font-size:18px; color:var(--primary); margin-bottom:20px;">Yangi Arxiv Qo'shish</h2>
            
            <div class="input-group">
                <label>Media: Rasm, Video yoki Audio (Qo'shmaslik ham mumkin)</label>
                <div class="upload-box" onclick="document.getElementById('addMediaFile').click()">
                    <p id="mediaPreviewText">+ Fayl Tanlash</p>
                    <img id="imgPreview" src="">
                    <video id="vidPreview" controls></video>
                    <audio id="audPreview" controls></audio>
                </div>
                <!-- Barcha formatlarni ruxsat beramiz! -->
                <input type="file" id="addMediaFile" accept="image/*,video/*,audio/*" style="display:none;" onchange="handleFileSelect(event)">
            </div>

            <div class="input-group">
                <label>Matn / Hikoya</label>
                <textarea id="addText" rows="6" placeholder="Fikrlaringizni yozing..."></textarea>
            </div>

            <button id="submitBtn" class="btn-primary" onclick="submitPost()">Tarmoqqa Joylash</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let tgUser = tg.initDataUnsafe?.user;
        const urlParams = new URLSearchParams(window.location.search);
        let validUserId = tgUser?.id || urlParams.get('uid');

        let globalPosts = [];
        let selectedFile = null;
        let isAdmin = false;

        if (tgUser) document.getElementById('userNameTxt').innerText = `${tgUser.first_name || 'Mehmon'}`.trim();
        if (validUserId) {
            document.getElementById('userIdTxt').innerText = `ID: ${validUserId}`;
            fetch('/api/check-admin', {
                method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ userId: validUserId })
            }).then(r=>r.json()).then(res => {
                isAdmin = res.isAdmin;
                if(isAdmin) document.getElementById('adminMenuSection').style.display = 'block';
                loadPosts(); 
            }).catch(()=>{});
        }

        function loadPosts() {
            fetch('/api/posts').then(res => res.json()).then(data => { globalPosts = data.posts || []; renderList(); });
        }
        loadPosts();

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }

        function navigate(viewId) {
            ['listView', 'addView'].forEach(id => {
                const el = document.getElementById(id);
                if (el) { if (id === viewId) el.classList.add('active'); else el.classList.remove('active'); }
            });
            window.scrollTo(0,0);
        }

        function renderList() {
            const grid = document.getElementById("posts-grid");
            if (globalPosts.length === 0) {
                grid.innerHTML = `<div style="text-align:center; padding:50px 0; color:#888;">Hech qanday post yo'q.</div>`;
                return;
            }

            let html = "";
            globalPosts.forEach(p => {
                const dateObj = new Date(p.created_at);
                const dateStr = dateObj.toLocaleDateString('uz-UZ', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                
                let mediaHtml = "";
                if (p.mediaUrl) {
                    const ext = p.mediaUrl.split('.').pop().toLowerCase();
                    if(['mp4', 'webm', 'ogg', 'mov'].includes(ext)) {
                        mediaHtml = `<video src="${p.mediaUrl}" class="post-media" controls></video>`;
                    } else if(['mp3', 'wav', 'm4a'].includes(ext)) {
                        mediaHtml = `<audio src="${p.mediaUrl}" controls style="width:100%; margin:16px;"></audio>`;
                    } else {
                        mediaHtml = `<img src="${p.mediaUrl}" class="post-media">`;
                    }
                }

                let deleteBtnHtml = isAdmin ? `<button class="btn-delete" onclick="deletePost('${p.id}')">🗑 O'chirish</button>` : "";

                html += `
                    <div class="post-card">
                        ${mediaHtml}
                        <div class="post-content">
                            <div class="post-date">${dateStr}</div>
                            ${p.text ? `<div class="post-text">${p.text}</div>` : ''}
                            ${deleteBtnHtml}
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            selectedFile = file;
            
            document.getElementById('mediaPreviewText').innerText = file.name;
            const imgEl = document.getElementById('imgPreview');
            const vidEl = document.getElementById('vidPreview');
            const audEl = document.getElementById('audPreview');
            
            imgEl.style.display = 'none'; vidEl.style.display = 'none'; audEl.style.display = 'none';
            imgEl.src = ''; vidEl.src = ''; audEl.src = '';

            const url = URL.createObjectURL(file);
            
            if (file.type.startsWith('image/')) {
                imgEl.src = url; imgEl.style.display = 'block';
            } else if (file.type.startsWith('video/')) {
                vidEl.src = url; vidEl.style.display = 'block';
            } else if (file.type.startsWith('audio/')) {
                audEl.src = url; audEl.style.display = 'block';
            }
        }

        async function submitPost() {
            const btn = document.getElementById('submitBtn');
            const txt = document.getElementById('addText').value;
            
            if (!txt && !selectedFile) return alert("Nimadir yozing yoki fayl qistiring (Video, rasm, audio)!");

            btn.innerHTML = "Yuklanmoqda (Kuting)..."; btn.disabled = true;

            const formData = new FormData();
            formData.append('userId', validUserId);
            formData.append('text', txt);
            if (selectedFile) {
                formData.append('media', selectedFile);
            }

            try {
                const req = await fetch('/api/posts', {
                    method: 'POST',
                    body: formData
                });
                
                if(!req.ok) throw new Error("Yuklashda xatolik yuz berdi");
                
                // Clear Form
                document.getElementById('addText').value = "";
                document.getElementById('addMediaFile').value = "";
                selectedFile = null;
                document.getElementById('mediaPreviewText').innerText = "+ Fayl Tanlash";
                document.getElementById('imgPreview').style.display = 'none';
                document.getElementById('vidPreview').style.display = 'none';
                document.getElementById('audPreview').style.display = 'none';
                
                btn.innerHTML = "Tarmoqqa Joylash"; btn.disabled = false;
                
                loadPosts(); navigate('listView');
            } catch(e) { 
                alert(e.message); 
                btn.innerHTML = "Tarmoqqa Joylash"; btn.disabled = false;
            }
        }

        async function deletePost(id) {
            if(!confirm("Haqiqatan o'chirasizmi?")) return;
            try { await fetch('/api/posts/' + id, { method: 'DELETE' }); loadPosts(); } catch(e) {}
        }
    </script>
</body>
</html>
