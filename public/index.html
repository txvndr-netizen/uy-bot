<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biography V19</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --surface: rgba(20, 20, 30, 0.6);
            --primary: #00ffcc; /* V19 Cyber/Synaptic Cyan */
            --secondary: #9d00ff; /* Deep Purple */
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --border: rgba(0, 255, 204, 0.2);
            --radius-lg: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* V19 Dynamic Background */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
        }
        
        .overlay-gradient {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 0%, rgba(157, 0, 255, 0.15) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        /* HEADER */
        .app-header {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(10,10,15,0.9) 0%, transparent 100%);
            position: relative; z-index: 10;
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .app-header h1 {
            font-size: 32px; font-weight: 800; letter-spacing: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; margin-bottom: 8px;
        }

        .app-header p {
            font-size: 14px; font-weight: 300; color: var(--text-muted); letter-spacing: 1px;
        }

        /* TIMELINE CONTAINER */
        .timeline {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        /* Center Line connecting posts */
        .timeline::before {
            content: '';
            position: absolute;
            top: 0; left: 40px; height: 100%; width: 2px;
            background: linear-gradient(to bottom, transparent, var(--primary), var(--secondary), transparent);
            opacity: 0.3;
        }

        .post-card {
            position: relative; margin-bottom: 40px; padding-left: 50px;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; transform: translateY(20px);
        }

        /* Glow node on the timeline */
        .post-card::before {
            content: ''; position: absolute; left: 16px; top: 20px;
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        .post-content {
            background: var(--surface);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .post-content:active {
            transform: scale(0.98); border-color: var(--secondary);
        }

        .post-date {
            font-size: 12px; font-weight: 600; color: var(--primary);
            margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase;
        }

        .post-text {
            font-size: 16px; line-height: 1.6; color: rgba(255,255,255,0.9);
            white-space: pre-wrap; margin-bottom: 16px;
        }

        .media-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 14px; background: rgba(0, 255, 204, 0.1);
            border-radius: 12px; font-size: 12px; font-weight: 600;
            color: var(--primary); border: 1px solid rgba(0, 255, 204, 0.2);
        }

        .btn-read-bot {
            display: block; width: 100%; text-align: center;
            padding: 16px; border-radius: 16px; margin-top: 40px;
            background: linear-gradient(135deg, var(--secondary), #4a00e0);
            color: #fff; font-size: 16px; font-weight: 800; text-decoration: none;
            box-shadow: 0 10px 30px rgba(157, 0, 255, 0.4); text-transform: uppercase;
            border: none; cursor: pointer;
        }

        .empty-state { text-align: center; color: var(--text-muted); padding: 60px 20px; font-size: 15px; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="overlay-gradient"></div>

    <div class="app-header">
        <h1>V19 Chronicle</h1>
        <p>Mening Tarixiy Yo'lim</p>
    </div>

    <div class="timeline" id="timelineList">
        <div class="empty-state">Tarixiy sahifalar yuklanmoqda...</div>
    </div>

    <div style="padding: 0 20px 40px;">
        <button class="btn-read-bot" onclick="closeApp()">To'liq formatda Botda o'qish</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function closeApp() { tg.close(); }

        fetch('/api/posts')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('timelineList');
                let posts = data.posts || [];
                
                if (posts.length === 0) {
                    list.innerHTML = `<div class="empty-state">Hali xotiralar bitilmagan... Bot orqali yangi post qo'shing.</div>`;
                    return;
                }

                let html = '';
                posts.forEach((p, idx) => {
                    const dateObj = new Date(p.created_at);
                    const dateStr = dateObj.toLocaleDateString('uz-UZ', { day: 'numeric', month: 'long', year: 'numeric' });
                    
                    let mediaLabel = '';
                    if (p.type === 'photo') mediaLabel = '📸 Rasm';
                    if (p.type === 'video') mediaLabel = '🎥 Video';
                    if (p.type === 'audio') mediaLabel = '🎧 Audio';

                    let badgeHtml = mediaLabel ? `<div class="media-badge">${mediaLabel} (Botda ko'rish mumkin)</div>` : '';

                    html += `
                        <div class="post-card" style="animation-delay: ${idx * 0.15}s;">
                            <div class="post-content">
                                <div class="post-date">${dateStr}</div>
                                ${p.text ? `<div class="post-text">${p.text}</div>` : ''}
                                ${badgeHtml}
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html;
            })
            .catch(err => {
                document.getElementById('timelineList').innerHTML = `<div class="empty-state">Xatolik yuz berdi: ${err.message}</div>`;
            });

        // V19 NEURAL PARTICLE BACKGROUND
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Node {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 0 || this.x > width) this.vx *= -1;
                if(this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 255, 204, 0.5)';
                ctx.fill();
            }
        }

        const nodes = Array.from({length: 40}, () => new Node());

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            for(let i=0; i<nodes.length; i++) {
                nodes[i].update();
                nodes[i].draw();
                
                for(let j=i+1; j<nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if(dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.strokeStyle = `rgba(157, 0, 255, ${1 - dist/150})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
