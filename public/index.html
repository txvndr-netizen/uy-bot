<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shaxsiy Arxiv</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --surface: rgba(20, 20, 30, 0.6);
            --primary: #00ffcc; /* Cyber Cyan */
            --secondary: #9d00ff; /* Deep Purple */
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --danger: #ff4d4d;
            --border: rgba(0, 255, 204, 0.2);
            --radius-lg: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: var(--text-main);
            overflow-x: hidden; min-height: 100vh; padding-top: 70px;
        }

        /* V19 Dynamic Background */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        .overlay-gradient {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 0%, rgba(157, 0, 255, 0.15) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        /* HEADER */
        .app-header {
            position: fixed; top: 0; left: 0; right: 0; height: 64px;
            background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.7) 100%);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 1000;
        }
        .header-btn { background: none; border: none; font-size: 24px; color: var(--primary); cursor: pointer; }
        .header-title { 
            font-size: 20px; font-weight: 800; letter-spacing: 1px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase;
        }

        /* CATEGORY CHIPS */
        .category-scroll {
            display: flex; overflow-x: auto; gap: 10px; padding: 20px 16px 10px;
            scrollbar-width: none;
        }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-pill {
            padding: 10px 18px; border-radius: 20px; background: rgba(0,0,0,0.4);
            color: var(--text-muted); font-size: 13px; font-weight: 600; white-space: nowrap;
            cursor: pointer; border: 1px solid var(--border); transition: all 0.3s;
            backdrop-filter: blur(8px);
        }
        .cat-pill.active {
            background: var(--primary); color: #000; border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100vh;
            background: rgba(15, 15, 20, 0.95); backdrop-filter: blur(15px); z-index: 2000;
            border-right: 1px solid var(--border); transition: left 0.3s; display: flex; flex-direction: column;
        }
        .sidebar.open { left: 0; }
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7); z-index: 1500; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .sidebar-overlay.open { opacity: 1; pointer-events: all; }
        .sidebar-header { padding: 40px 20px 24px; border-bottom: 1px solid var(--border); }
        .profile-name { font-size: 18px; font-weight: 800; color: var(--primary); }
        .menu-item { padding: 16px 20px; font-size: 15px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        
        .page-container { padding: 0 16px 40px; display: none; animation: fadeIn 0.4s ease; }
        .page-container.active { display: block; }
        .back-nav { display: inline-flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; color: var(--primary); padding: 8px 0; margin-bottom: 16px; cursor: pointer; }

        /* POST CARDS (V19 GLOW STYLE) */
        .post-card {
            background: var(--surface); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            margin-bottom: 30px; overflow: hidden; position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .post-media { width: 100%; max-height: 400px; display: block; object-fit: contain; background: #000; }
        .post-content { padding: 20px; }
        .post-date { font-size: 11px; font-weight: 800; color: var(--primary); margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase; }
        .post-text { font-size: 16px; line-height: 1.6; color: rgba(255,255,255,0.9); white-space: pre-wrap; }

        /* DELETION */
        .btn-delete { width: 100%; padding: 12px; background: rgba(255,77,77,0.1); color: var(--danger); border: 1px solid rgba(255,77,77,0.3); border-radius: 8px; font-weight: bold; margin-top: 16px; cursor: pointer; transition: 0.2s; }
        .btn-delete:active { background: rgba(255,77,77,0.2); }

        /* FORM PANEL (ADD POST) */
        .form-panel { background: var(--surface); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); font-weight:600; }
        .input-group textarea { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.5); color: #fff; font-size: 15px; outline: none; font-family: 'Outfit'; }
        
        .upload-box {
            width: 100%; padding: 30px; border: 2px dashed var(--primary); background: rgba(0, 255, 204, 0.05);
            border-radius: 12px; text-align: center; cursor: pointer;
        }
        .upload-box p { color: var(--primary); font-weight: 800; font-size:15px; }
        .upload-box audio, .upload-box video, .upload-box img { width: 100%; max-height: 250px; margin-top: 15px; display: none; border-radius:8px; object-fit:contain; }

        .btn-primary {
            width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000; font-weight: 800; font-size:16px; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(0, 255, 204, 0.3);
        }

        .empty-state { text-align: center; color: var(--text-muted); padding: 50px 20px; font-size: 14px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="overlay-gradient"></div>

    <div class="app-header">
        <button class="header-btn" onclick="toggleSidebar()">☰</button>
        <div class="header-title">Arxiv va Xotiralar</div>
        <div style="width: 24px;"></div>
    </div>

    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div style="display: flex; justify-content: space-between;">
                <div class="profile-name" id="userNameTxt">Mehmon</div>
                <div onclick="toggleSidebar()" style="font-size: 24px; color: #fff; cursor: pointer;">✕</div>
            </div>
        </div>
        
        <div style="flex-grow: 1; overflow-y: auto;">
            <div class="menu-item" onclick="navigate('listView'); toggleSidebar();">📖 Barcha Postlar</div>
            
            <div id="adminMenuSection" style="display:none; border-top:1px solid rgba(255,255,255,0.1); margin-top:10px;">
                <div style="padding: 16px 20px 8px; color:var(--primary); font-size:11px; font-weight:800; letter-spacing:1px;">ADMIN PANEL</div>
                <div class="menu-item" onclick="navigate('addView'); toggleSidebar();" style="color:var(--primary);">➕ Yangi Post Qo'shish</div>
            </div>
        </div>
    </div>

    <!-- LIST VIEW -->
    <div id="listView" class="page-container active">
        <!-- Categories -->
        <div class="category-scroll">
            <div class="cat-pill active" onclick="setCategory(this, 'all')">📚 Barchasi</div>
            <div class="cat-pill" onclick="setCategory(this, 'video')">🎥 Videolar</div>
            <div class="cat-pill" onclick="setCategory(this, 'audio')">🎧 Audiolar</div>
            <div class="cat-pill" onclick="setCategory(this, 'photo')">📸 Rasmlar</div>
            <div class="cat-pill" onclick="setCategory(this, 'text')">📝 Matnlar</div>
        </div>

        <div id="posts-grid"><div class="empty-state">Yuklanmoqda...</div></div>
    </div>

    <!-- ADD VIEW -->
    <div id="addView" class="page-container">
        <div class="back-nav" onclick="navigate('listView')">← Orqaga</div>
        <div class="form-panel">
            <h2 style="font-size:20px; color:var(--primary); margin-bottom:24px;">Yangi Post Qo'shish</h2>
            
            <div class="input-group">
                <label>Media: Video, Audio yoki Rasm biriktirish</label>
                <div class="upload-box" onclick="document.getElementById('addMediaFile').click()">
                    <p id="mediaPreviewText">Yangi fayl tanlash +</p>
                    <img id="imgPreview" src="">
                    <video id="vidPreview" controls></video>
                    <audio id="audPreview" controls></audio>
                </div>
                <input type="file" id="addMediaFile" accept="image/*,video/*,audio/*" style="display:none;" onchange="handleFileSelect(event)">
            </div>

            <div class="input-group">
                <label>Matn / Hikoya</label>
                <textarea id="addText" rows="6" placeholder="Fikrlaringizni yozing yoki videoga izoh qoldiring..."></textarea>
            </div>

            <button id="submitBtn" class="btn-primary" onclick="submitPost()">Tarmoqqa Joylash 🚀</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();

        let tgUser = tg.initDataUnsafe?.user;
        const urlParams = new URLSearchParams(window.location.search);
        let validUserId = tgUser?.id || urlParams.get('uid');

        let globalPosts = [];
        let curCat = "all";
        let selectedFile = null;
        let isAdmin = false;

        if (tgUser) document.getElementById('userNameTxt').innerText = `${tgUser.first_name || 'Mehmon'}`.trim();
        if (validUserId) {
            fetch('/api/check-admin', {
                method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ userId: validUserId })
            }).then(r=>r.json()).then(res => {
                isAdmin = res.isAdmin;
                if(isAdmin) document.getElementById('adminMenuSection').style.display = 'block';
                loadPosts(); 
            }).catch(()=>{});
        }

        function loadPosts() {
            fetch('/api/posts').then(res => res.json()).then(data => { globalPosts = data.posts || []; renderList(); });
        }
        loadPosts();

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }

        function navigate(viewId) {
            ['listView', 'addView'].forEach(id => {
                const el = document.getElementById(id);
                if (el) { if (id === viewId) el.classList.add('active'); else el.classList.remove('active'); }
            });
            window.scrollTo(0,0);
        }

        function setCategory(el, catName) {
            document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
            if(el) el.classList.add('active');
            curCat = catName;
            renderList();
        }

        function getMediaType(mediaUrl) {
            if (!mediaUrl) return 'text';
            const ext = mediaUrl.split('.').pop().toLowerCase();
            if(['mp4', 'webm', 'ogg', 'mov'].includes(ext)) return 'video';
            if(['mp3', 'wav', 'm4a'].includes(ext)) return 'audio';
            return 'photo';
        }

        function renderList() {
            const grid = document.getElementById("posts-grid");
            
            let filtered = globalPosts;
            if (curCat !== 'all') {
                filtered = globalPosts.filter(p => getMediaType(p.mediaUrl) === curCat);
            }

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state">Bu ruknda hech qanday post yo'q.</div>`;
                return;
            }

            let html = "";
            filtered.forEach(p => {
                const dateObj = new Date(p.created_at);
                const dateStr = dateObj.toLocaleDateString('uz-UZ', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                
                let mediaHtml = "";
                if (p.mediaUrl) {
                    const type = getMediaType(p.mediaUrl);
                    if(type === 'video') mediaHtml = `<video src="${p.mediaUrl}" class="post-media" controls></video>`;
                    else if(type === 'audio') mediaHtml = `<audio src="${p.mediaUrl}" controls style="width:calc(100% - 32px); margin:16px; border-radius:12px;"></audio>`;
                    else mediaHtml = `<img src="${p.mediaUrl}" class="post-media">`;
                }

                let deleteBtnHtml = isAdmin ? `<button class="btn-delete" onclick="deletePost('${p.id}')">🗑 Postni O'chirish</button>` : "";

                html += `
                    <div class="post-card">
                        ${mediaHtml}
                        <div class="post-content">
                            <div class="post-date">${dateStr}</div>
                            ${p.text ? `<div class="post-text">${p.text}</div>` : ''}
                            ${deleteBtnHtml}
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            selectedFile = file;
            
            document.getElementById('mediaPreviewText').innerText = file.name;
            const imgEl = document.getElementById('imgPreview');
            const vidEl = document.getElementById('vidPreview');
            const audEl = document.getElementById('audPreview');
            
            imgEl.style.display = 'none'; vidEl.style.display = 'none'; audEl.style.display = 'none';
            imgEl.src = ''; vidEl.src = ''; audEl.src = '';

            const url = URL.createObjectURL(file);
            
            if (file.type.startsWith('image/')) {
                imgEl.src = url; imgEl.style.display = 'block';
            } else if (file.type.startsWith('video/')) {
                vidEl.src = url; vidEl.style.display = 'block';
            } else if (file.type.startsWith('audio/')) {
                audEl.src = url; audEl.style.display = 'block';
            }
        }

        async function submitPost() {
            const btn = document.getElementById('submitBtn');
            const txt = document.getElementById('addText').value;
            
            if (!txt && !selectedFile) return alert("Nimadir yozing yoki rasm/video/audio qistiring!");

            btn.innerHTML = "Yuklanmoqda..."; btn.disabled = true;

            const formData = new FormData();
            formData.append('userId', validUserId);
            formData.append('text', txt);
            if (selectedFile) formData.append('media', selectedFile);

            try {
                const req = await fetch('/api/posts', { method: 'POST', body: formData });
                if(!req.ok) throw new Error("Yuklashda xatolik");
                
                // Form reset
                document.getElementById('addText').value = "";
                document.getElementById('addMediaFile').value = "";
                selectedFile = null;
                document.getElementById('mediaPreviewText').innerText = "Yangi fayl tanlash +";
                document.getElementById('imgPreview').style.display = 'none';
                document.getElementById('vidPreview').style.display = 'none';
                document.getElementById('audPreview').style.display = 'none';
                
                btn.innerHTML = "Tarmoqqa Joylash 🚀"; btn.disabled = false;
                
                loadPosts(); navigate('listView');
            } catch(e) { alert(e.message); btn.innerHTML = "Tarmoqqa Joylash 🚀"; btn.disabled = false; }
        }

        async function deletePost(id) {
            if(!confirm("Bu postni o'chirib tashlaysizmi?")) return;
            try { await fetch('/api/posts/' + id, { method: 'DELETE' }); loadPosts(); } catch(e) {}
        }

        /* --- PARTICLES BACKGROUND (NO "V19" BRANDING) --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Node {
            constructor() {
                this.x = Math.random() * width; this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 0 || this.x > width) this.vx *= -1;
                if(this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 255, 204, 0.4)'; ctx.fill();
            }
        }
        const nodes = Array.from({length: 30}, () => new Node());

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for(let i=0; i<nodes.length; i++) {
                nodes[i].update(); nodes[i].draw();
                for(let j=i+1; j<nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x; const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < 150) {
                        ctx.beginPath(); ctx.moveTo(nodes[i].x, nodes[i].y); ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.strokeStyle = `rgba(157, 0, 255, ${1 - dist/150})`; ctx.lineWidth = 1; ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
